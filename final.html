<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Slider Fix</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  
body {
  margin: 0;
  overflow-x: hidden;
}

/* FULL WIDTH SLIDER */
.scrolling-gallery {
  display: flex;
  overflow: hidden;
  width: 100vw;
  height: 80vh;
}

.scrolling-gallery img {
  min-width: 100vw;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<!-- FULL WIDTH IMAGE SLIDER -->
<div class="scrolling-gallery">
  <img src="https://picsum.photos/id/10/1600/900">
  <img src="https://picsum.photos/id/20/1600/900">
  <img src="https://picsum.photos/id/30/1600/900">
  <img src="https://picsum.photos/id/40/1600/900">
</div>

<script>
const gallery = document.querySelector(".scrolling-gallery");

let index = 0;

function autoSlide() {
  index++;

  if (index >= gallery.children.length) {
    index = 0;
  }

  gallery.scrollTo({
    left: index * window.innerWidth,
    behavior: "smooth"
  });
}

// Auto slide every 3 sec
setInterval(autoSlide, 3000);
</script>

</body>
</html>
